<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>Calculate your BMI</header>
    <div class="main">
        
            <label for="">Enter your weight in kg</label><br>
            <input type="number" name="weight" id="weight" placeholder="Body weight in kg"><br><br>
            <label for="">Enter your height in cm</label><br>
            <input type="number" name="height" id="height" placeholder="Body height in cm"><br><br>
            <button type="submit" id="submitBtn">submit</button> <br><br>

       
        <h3 id="result">Result:</h3>
        <ul>
            <li>Underweight means your BMI is less than 18.5</li>
            <li>Normal weight means your BMI is between 18.5 and 24.9</li>
            <li>Overweight means your BMI is between 25 and 29.9</li>
            <li>Obese means your BMI is 30 or more</li>
        </ul>

    
    </div>
    <footer>Made by Ishan Using JS in 2026</footer>
    <script src="script.js"></script>
</body>

</html>
